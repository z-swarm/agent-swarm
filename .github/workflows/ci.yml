# @file ci.yml
# @brief PR 阻塞检查（DESIGN.md §17.4 / §17.8）
#
# W14b 修订（v2）：
#   - fast-checks: lint + mypy + pytest（ubuntu-latest）
#   - security-scan: 每 PR 跑 tools/agent_review.py（DESIGN §17.1 强制）
#   - windows-smoke: TUI/doctor 在 windows-latest 烟测（缓解 §17.6 TUI 风险）
#
# 真实 LLM 走 nightly.yml；这里全部 mock，零网络调用

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    name: Lint + Type + Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/
        continue-on-error: true  # W1 不强制 format；W2 起转为阻塞

      - name: Mypy type check
        run: mypy src/

      - name: Pytest (unit + integration + e2e)
        env:
          # CI 中无真实 OpenAI key——所有测试必须能在 fake_llm 下跑通
          OPENAI_API_KEY: "sk-fake-ci-test-key"
        run: |
          pytest tests/unit/ tests/integration/ tests/e2e/ \
            --cov=src/agent_swarm \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # W14b-②: 静态安全扫描（DESIGN §17.1 强制）
  security-scan:
    name: Static Security Scan (agent_review.py)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run agent_review.py (simple mode, no LLM)
        env:
          # 简单模式不调 LLM；CRITICAL 级别 finding 必须 fail
          AGENT_REVIEW_FAIL_ON: "CRITICAL"
        run: |
          # 跑在 HEAD 上，diff 是空；W14b 范围内——验证工具能跑通
          # 真实 PR 跑时 diff 来自 ${{ github.event.pull_request.base.sha }}..HEAD
          python tools/agent_review.py --mode=simple || {
            echo "::error::agent_review.py found CRITICAL security issues"
            exit 1
          }

  # W14b-⑤: Windows 烟测（缓解 §17.6 TUI 兼容风险）
  windows-smoke:
    name: Windows TUI/Doctor smoke
    runs-on: windows-latest
    timeout-minutes: 10
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: doctor (skip network)
        shell: pwsh
        run: |
          python -m agent_swarm.cli.main doctor --skip-llm --skip-mcp

      - name: TUI smoke import
        shell: pwsh
        run: |
          # 仅验证 TUI 模块能 import（Windows console 不同，全跑易 flaky）
          python -c "from agent_swarm.tui import run_dashboard; print('TUI module loads OK')"

      - name: count_reconnect 验证脚本
        shell: pwsh
        run: |
          python tools/count_reconnect.py
