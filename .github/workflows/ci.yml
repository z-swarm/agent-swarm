# @file ci.yml
# @brief PR 阻塞检查（DESIGN.md §17.4 / §17.8）
#
# 守门规则:
#   ① ruff lint           （阻塞）
#   ② mypy 类型检查       （阻塞）
#   ③ pytest unit + integration  （阻塞）
#   ④ coverage gate >= 75%（W1 阶段；W6 升至 80%）
#
# 真实 LLM 走 nightly.yml；这里全部 mock，零网络调用

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    name: Lint + Type + Test (Phase 1 gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/
        continue-on-error: true  # W1 不强制 format；W2 起转为阻塞

      - name: Mypy type check
        run: mypy src/

      - name: Pytest (unit + integration + e2e)
        env:
          # CI 中无真实 OpenAI key——所有测试必须能在 fake_llm 下跑通
          OPENAI_API_KEY: "sk-fake-ci-test-key"
        run: |
          pytest tests/unit/ tests/integration/ tests/e2e/ \
            --cov=src/agent_swarm \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
