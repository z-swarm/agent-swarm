<!-- P5-W28 base layout — HTMX 启用 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{{ title or "agent-swarm" }}{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- HTMX 2.0 (CDN) -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <!-- WebSocket helper -->
    <script src="/static/app.js" defer></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="topnav">
    <div class="brand">
        <a href="/">🐝 agent-swarm</a>
        <span class="ver">v{{ version or "0.5.0a1" }}</span>
    </div>
    <div class="navlinks">
        <a href="/" hx-get="/" hx-target="#content" hx-swap="innerHTML"
           hx-push-url="true" hx-trigger="click"
           class="{% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="/agents" hx-get="/agents" hx-target="#content" hx-swap="innerHTML"
           hx-push-url="true" hx-trigger="click"
           class="{% if page == 'agents' %}active{% endif %}">Agents</a>
        <a href="/worktrees" hx-get="/worktrees" hx-target="#content" hx-swap="innerHTML"
           hx-push-url="true" hx-trigger="click"
           class="{% if page == 'worktrees' %}active{% endif %}">Worktrees</a>
        <a href="/tasks" hx-get="/tasks" hx-target="#content" hx-swap="innerHTML"
           hx-push-url="true" hx-trigger="click"
           class="{% if page == 'tasks' %}active{% endif %}">Tasks</a>
        <a href="/review" hx-get="/review" hx-target="#content" hx-swap="innerHTML"
           hx-push-url="true" hx-trigger="click"
           class="{% if page == 'review' %}active{% endif %}">Review</a>
        <a href="/metrics" target="_blank" class="api">/metrics</a>
    </div>
    <div class="ws-status" id="ws-status">
        <span class="dot off">●</span> <span class="label">disconnected</span>
    </div>
</nav>
<main id="content">
{% block content %}{% endblock %}
</main>
<footer>
    <small>agent-swarm Web UI v0.5.0a1 · HTMX 2.0 · FastAPI</small>
</footer>
</body>
</html>
