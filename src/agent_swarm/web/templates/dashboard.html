{% extends "base.html" %}
{% block title %}Dashboard · agent-swarm{% endblock %}
{% block content %}
<section class="page-header">
    <h1>Dashboard</h1>
    <p class="subtitle">实时事件流 + 关键指标</p>
</section>

<section class="grid-2">
    <div class="card">
        <h2>📊 Metrics
            <small hx-get="/partials/metrics" hx-trigger="every 5s" hx-swap="innerHTML">
                加载中...
            </small>
        </h2>
    </div>

    <div class="card">
        <h2>📡 Real-time Events
            <small>via WebSocket</small>
        </h2>
        <ul id="ws-event-list" class="event-list">
            <li class="event-info">等待事件...</li>
        </ul>
        <details>
            <summary>Recent events (server-side buffer)</summary>
            <ul class="event-list"
                hx-get="/partials/events" hx-trigger="every 3s" hx-swap="innerHTML">
                <li class="event-info">加载中...</li>
            </ul>
        </details>
    </div>
</section>
{% endblock %}
